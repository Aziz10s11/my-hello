<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سيرتي الذاتية</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0b1220;
    color:#fff;
}

/* Header */
header{
    text-align:center;
    padding:70px 20px;
    background:linear-gradient(135deg,#4f46e5,#06b6d4);
}

header img{
    width:130px;
    height:130px;
    border-radius:50%;
    border:4px solid white;
}

header h1{
    margin:10px 0 5px;
}

header p{
    opacity:0.9;
}

/* Container */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* Cards */
.card{
    background:#111827;
    margin:20px 0;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.4);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

/* Skills bar */
.skill{
    margin:10px 0;
}

.bar{
    height:10px;
    background:#1f2937;
    border-radius:10px;
    overflow:hidden;
}

.bar span{
    display:block;
    height:100%;
    background:linear-gradient(90deg,#06b6d4,#4f46e5);
}

/* Button */
.btn{
    display:inline-block;
    padding:12px 25px;
    background:#25D366;
    color:white;
    border-radius:25px;
    text-decoration:none;
    margin-top:10px;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}
</style>

</head>

<body>

<header>
    <img src="https://i.imgur.com/8Km9tLL.png">
    <h1>اسمك هنا</h1>
    <p>مطور ويب | Front-End Developer</p>
</header>

<div class="container">

    <div class="card">
        <h2>نبذة عني</h2>
        <p>أنا مطور ويب أتعلم بناء مواقع احترافية باستخدام HTML و CSS و JavaScript.</p>
    </div>

    <div class="card">
        <h2>المهارات</h2>

        <div class="skill">
            HTML
            <div class="bar"><span style="width:95%"></span></div>
        </div>

        <div class="skill">
            CSS
            <div class="bar"><span style="width:90%"></span></div>
        </div>

        <div class="skill">
            JavaScript
            <div class="bar"><span style="width:75%"></span></div>
        </div>

    </div>

    <div class="card">
        <h2>مشاريعي</h2>
        <p>موقع CV - موقع شخصي - مشاريع صغيرة للتعلم</p>
    </div>

    <div class="card">
        <h2>تواصل معي</h2>

        <a class="btn" href="https://wa.me/213XXXXXXXXX" target="_blank">
            واتساب 📱
        </a>
    </div>

</div>

</body>
</html>
